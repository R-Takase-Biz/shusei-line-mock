<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>守成クラブ 公式LINE モック</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --g:#06C755;          /* LINEグリーン（主導線・主ボタン・選択済のみ） */
    --gd:#05B24C;         /* 押下 */
    --g-face:#E8F8EF;     /* 淡グリーン面 */
    --success:#1E9E5A;    /* 成功（文字） */
    --danger:#C0392B;     /* 注意/欠席（文字） */
    --danger-face:#FBECEA;/* 注意/欠席（面） */
    --info:#2F6FB0;       /* 情報 */
    --navy:#0F2540;       /* 管理画面/見出し */
    --navy-face:#F5F7FB;  /* 淡ネイビー面 */
    --ink:#1F2933;        /* 本文 */
    --sub:#5A6675;        /* 副次テキスト（AA） */
    --cap:#586372;        /* キャプション（白上5.3:1・灰面でもAA確保） */
    --line:#E3E8EF;       /* 境界 */
    --line2:#D5DCE6;      /* 強境界 */
    --card:#FFFFFF;       /* 面（カード） */
    --mem-bg:#F4F6F9;     /* 会員画面地 */
    --app-bg:#EEF1F5;     /* アプリ余白 */
    --chat:#8CABD9;       /* LINEチャット背景 */
    --sh1:0 1px 2px rgba(16,24,40,.04);
    --sh2:0 4px 12px rgba(16,24,40,.05);
    /* 角丸スケール（8 / 12 / 16 の3段に統一） */
    --r-sm:8px;
    --r-md:12px;
    --r-lg:16px;
  }
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    background:var(--app-bg);color:var(--ink);-webkit-font-smoothing:antialiased;
    padding:24px 16px 64px;line-height:1.6;letter-spacing:.02em;overflow-x:hidden;
  }
  .wrap{max-width:960px;margin:0 auto}
  .lead{text-align:center;margin-bottom:24px}
  .lead h1{font-size:20px;line-height:1.4;color:var(--navy);font-weight:700;letter-spacing:.01em}
  .lead p{font-size:13px;color:var(--sub);margin-top:8px;line-height:1.6}
  .switch{display:flex;gap:8px;justify-content:center;margin:16px 0 24px}
  .switch button{
    border:1.5px solid var(--line2);background:#fff;color:var(--sub);
    font-weight:700;font-size:13px;padding:10px 20px;border-radius:99px;cursor:pointer;
    transition:background .15s,color .15s,border-color .15s;min-height:44px;
  }
  .switch button.on{background:var(--g);border-color:var(--g);color:#fff}
  .views{display:flex;gap:40px;justify-content:center;align-items:flex-start;flex-wrap:wrap}

  /* ===== phone ===== */
  .phone{
    width:min(360px,100%);max-width:360px;background:#fff;border-radius:44px;border:12px solid #10151c;
    overflow:hidden;box-shadow:0 24px 60px rgba(10,20,40,.30);position:relative;
  }
  /* 簡易ステータスバー（iOS風：白地＋ダーク文字） */
  .statusbar{
    background:#fff;color:var(--ink);display:flex;align-items:center;justify-content:space-between;
    padding:8px 20px 4px;font-size:13px;font-weight:700;letter-spacing:.02em;
  }
  .statusbar .sb-r{display:flex;align-items:center;gap:6px}
  .statusbar svg{width:17px;height:17px;display:block;color:var(--ink)}
  /* トークヘッダー（本物のLINE公式アカウント風：白地＋黒文字） */
  .topbar{
    background:#fff;color:var(--ink);border-bottom:1px solid var(--line);
    padding:8px 12px 12px;display:flex;align-items:center;gap:8px;min-height:56px;
  }
  .topbar .back{
    font-size:26px;line-height:1;cursor:pointer;width:44px;height:44px;flex:none;color:var(--ink);
    display:flex;align-items:center;justify-content:center;visibility:hidden;border-radius:50%;
    transition:background .12s;
  }
  .topbar .back:active{background:var(--app-bg)}
  .topbar .back.show{visibility:visible}
  .topbar .avatar{width:36px;height:36px;border-radius:50%;background:var(--navy-face);display:flex;align-items:center;justify-content:center;flex:none}
  .topbar .avatar svg{width:22px;height:22px;color:var(--navy)}
  .topbar .t{font-size:15px;font-weight:700;line-height:1.3;color:var(--navy)}
  .topbar .s{font-size:12px;font-weight:400;color:var(--sub);line-height:1.3}
  .screen{height:560px;overflow-y:auto;background:var(--mem-bg);outline:none}
  .pad{padding:16px}

  /* home（トーク背景＋最下部にドッキングしたリッチメニュー） */
  .home{min-height:100%;display:flex;flex-direction:column}
  .chatbg{background:var(--chat);padding:16px 16px 20px;flex:1 0 auto}
  .bubble{
    background:#fff;border-radius:4px 16px 16px 16px;padding:12px 14px;max-width:82%;
    font-size:14px;line-height:1.6;box-shadow:var(--sh1);
  }
  .bubble b{color:var(--success);font-weight:700}
  .richwrap{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);box-shadow:0 -2px 8px rgba(16,24,40,.05)}
  .menulabel{font-size:12px;color:var(--sub);text-align:center;padding:8px 0 6px;font-weight:700;letter-spacing:.04em}
  .rich{display:grid;grid-template-columns:repeat(3,1fr);background:var(--line);gap:1px;border-top:1px solid var(--line)}
  .tile{
    background:#fff;min-height:72px;aspect-ratio:1/.92;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:background .12s;
  }
  .tile:active{background:#F1F7F4}
  .tile.hot{background:var(--g)}
  .tile.hot:active{background:var(--gd)}
  .tile.hot .ic,.tile.hot .lb{color:#fff}
  .tile .ic{color:#2C3742;line-height:1}
  .tile .ic svg{width:24px;height:24px;display:block}
  .tile .lb{font-size:12px;font-weight:700;text-align:center;line-height:1.3;color:#2C3742}

  /* generic screen */
  .scr-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:4px;letter-spacing:.01em}
  .scr-sub{font-size:13px;font-weight:400;color:var(--sub);margin-bottom:16px;line-height:1.6}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px;
    margin-bottom:16px;box-shadow:var(--sh1),var(--sh2);
  }
  .card .date{font-size:15px;font-weight:700;color:var(--navy);letter-spacing:.01em;display:flex;align-items:center;gap:6px}
  .card .date svg{width:16px;height:16px;color:var(--navy);flex:none}
  .card .meta{font-size:13px;font-weight:400;color:var(--sub);margin-top:8px;line-height:1.6}
  .seg-row{display:flex;align-items:center;justify-content:space-between;margin-top:16px;gap:12px}
  .seg-row .k{font-size:13px;font-weight:700;color:var(--ink)}
  .seg{display:flex;gap:8px}
  .seg button{
    border:1.5px solid var(--line2);background:#fff;font-size:13px;font-weight:700;color:var(--sub);
    min-height:44px;padding:10px 16px;border-radius:var(--r-md);cursor:pointer;
    transition:background .15s,color .15s,border-color .15s;
  }
  .seg button:active{background:#F1F3F6}
  /* 出席・参加：グリーン塗り／欠席・不参加：赤系塗りで二重シグナル化 */
  .seg button.pick-y{background:var(--g);color:#fff;border-color:var(--g)}
  .seg button.pick-n{background:var(--danger-face);color:var(--danger);border-color:var(--danger)}
  .saved{
    margin-top:12px;font-size:13px;font-weight:700;color:var(--success);background:var(--g-face);
    padding:8px 12px;border-radius:var(--r-sm);display:none;
  }
  .saved.show{display:block;animation:fadeIn .15s ease-out}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-2px)}to{opacity:1;transform:none}}

  .empty{
    text-align:center;color:var(--sub);font-size:13px;line-height:1.6;padding:32px 16px;
    border:1px dashed var(--line2);border-radius:var(--r-lg);background:#fff;
  }
  .empty .em-ic{font-size:32px;display:block;margin-bottom:12px}

  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:8px}
  .field input{
    width:100%;height:48px;border:1.5px solid var(--line2);border-radius:var(--r-md);padding:0 14px;
    font-size:16px;color:var(--ink);background:#fff;transition:border-color .12s,box-shadow .12s;
  }
  .field input::placeholder{color:var(--cap)}
  .field input:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(6,199,85,.15)}
  .btn{
    width:100%;height:48px;background:var(--g);color:#fff;border:none;border-radius:var(--r-md);
    font-size:14px;font-weight:700;cursor:pointer;transition:background .12s,transform .12s;
  }
  .btn:active{transform:translateY(1px);background:var(--gd)}
  .btn:disabled,.btn[disabled]{background:#C7CED8;color:#fff;cursor:not-allowed;transform:none}
  .btn.sub{background:#fff;color:var(--g);border:1.5px solid var(--g)}
  .btn.sub:active{background:var(--g-face);transform:translateY(1px)}
  .hint{font-size:12px;color:var(--cap);margin-top:12px;line-height:1.6}

  .mlist .mrow{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line)}
  .mlist .mrow .ava{width:40px;height:40px;border-radius:50%;background:var(--navy-face);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex:none}
  .mlist .mrow .nm{font-size:14px;font-weight:700;color:var(--ink)}
  .mlist .mrow .co{font-size:13px;font-weight:400;color:var(--sub);margin-top:2px}
  .lock{text-align:center;padding:48px 24px;color:var(--sub)}
  .lock .lk{font-size:40px}
  .lock p{font-size:13px;margin-top:16px;line-height:1.6}
  .newsrow{padding:16px 2px;border-bottom:1px solid var(--line)}
  .newsrow .d{font-size:12px;color:var(--cap)}
  .newsrow .h{font-size:14px;font-weight:700;color:var(--ink);margin-top:4px}
  .mapbox{height:192px;border-radius:var(--r-md);background:linear-gradient(135deg,#E1E9F3,#EEF3F8);display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;color:var(--sub);font-size:13px;border:1px solid var(--line);margin-bottom:16px}
  .mapbox svg{width:28px;height:28px;color:var(--sub)}

  /* ===== admin ===== */
  .admin{width:min(520px,100%);max-width:520px;background:#fff;border-radius:var(--r-lg);box-shadow:var(--sh1),var(--sh2);border:1px solid var(--line);overflow:hidden;align-self:stretch}
  .admin-bar{background:var(--navy);color:#fff;padding:16px 24px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
  .admin-body{padding:24px}
  .sec{margin-bottom:24px}
  .sec:last-child{margin-bottom:0}
  .sec h3{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px;letter-spacing:.01em}
  .sec h3 .n{background:var(--navy-face);color:var(--navy);width:24px;height:24px;border-radius:var(--r-sm);font-size:13px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex:none}
  .drop{border:2px dashed var(--line2);border-radius:var(--r-md);padding:24px;text-align:center;color:var(--sub);font-size:13px;line-height:1.6;cursor:pointer;background:var(--navy-face);transition:border-color .12s,background .12s}
  .drop:active{background:#EFF2F7}
  .drop.done{border-color:var(--success);background:var(--g-face);color:var(--success);font-weight:700}
  .mlabel{display:block;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:6px}
  .stat{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
  .stat .b{background:var(--navy-face);border:1px solid var(--line);border-radius:var(--r-md);padding:16px 8px;text-align:center}
  .stat .b .v{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.01em}
  .stat .b .l{font-size:12px;color:var(--sub);margin-top:8px}
  #st-att{color:var(--success)}
  #st-abs{color:var(--danger)}
  #st-par{color:var(--navy)}
  .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:16px}
  .tbl th,.tbl td{border-bottom:1px solid var(--line);padding:12px 8px;text-align:left;vertical-align:top;min-height:44px}
  .tbl th{color:var(--sub);font-size:12px;font-weight:700}
  .tbl .bg{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px}
  .tbl .y{color:var(--success);background:var(--g-face)}
  .tbl .no{color:var(--danger);background:var(--danger-face)}
  .tbl .sub-date{font-size:12px;color:var(--cap);display:block;margin-top:4px;font-weight:400}
  .mini{background:#fff;border:1.5px solid var(--line2);border-radius:var(--r-md);height:48px;padding:0 14px;font-size:16px;color:var(--ink);width:100%;margin-bottom:8px;transition:border-color .12s,box-shadow .12s}
  .mini::placeholder{color:var(--cap)}
  .mini:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(6,199,85,.15)}
  .rowg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--g-face);color:var(--success);margin-left:8px}
  .note{font-size:12px;color:var(--cap);line-height:1.6;margin-top:8px}
  .note.err{color:var(--danger);font-weight:700}
  .note.ok{color:var(--success);font-weight:700}

  /* 状態：フォーカス可視・選択の非色シグナル・エラー */
  :focus-visible{outline:2px solid var(--g);outline-offset:2px;border-radius:6px}
  .tile:focus-visible{outline-offset:-2px}
  .seg button.pick-y::before,.seg button.pick-n::before{content:"✓";font-weight:800;margin-right:5px}
  .req{color:var(--danger);margin-left:4px;font-weight:700}
  .auth-err{display:none;background:var(--danger-face);color:var(--danger);font-size:13px;font-weight:700;padding:10px 12px;border-radius:var(--r-sm);margin-bottom:12px;line-height:1.5}
  .auth-err.show{display:block;animation:fadeIn .15s ease-out}
  .input-err{border-color:var(--danger)!important;box-shadow:0 0 0 3px rgba(192,57,43,.15)!important}
  .hide{display:none!important}

  /* レスポンシブ（iPhone幅で横スクロールを起こさない） */
  @media(max-width:560px){
    .views{gap:24px}
    .admin-body{padding:16px}
  }
  @media(max-width:400px){
    body{padding:24px 8px 64px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="lead">
    <h1>守成クラブ 南会場 公式LINE ― 動作モック</h1>
    <p>実際にタップして動きます。※データはこのブラウザ上だけの仮のものです</p>
  </div>
  <div class="switch" role="tablist" aria-label="表示の切り替え">
    <button id="sw-mem" class="on" role="tab" aria-selected="true" aria-controls="side-mem" onclick="showSide('mem')">📱 会員が見る画面</button>
    <button id="sw-adm" role="tab" aria-selected="false" aria-controls="side-adm" onclick="showSide('adm')">🖥️ 世話人の管理画面</button>
  </div>

  <div class="views">
    <!-- ============ 会員側スマホ ============ -->
    <div class="phone" id="side-mem" role="tabpanel" aria-labelledby="sw-mem">
      <div class="statusbar">
        <span>9:41</span>
        <span class="sb-r">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="電波"><rect x="2.5" y="14" width="3" height="6" rx="1" fill="currentColor" stroke="none"/><rect x="7.5" y="10" width="3" height="10" rx="1" fill="currentColor" stroke="none"/><rect x="12.5" y="6" width="3" height="14" rx="1" fill="currentColor" stroke="none"/><rect x="17.5" y="2.5" width="3" height="17.5" rx="1" fill="currentColor" stroke="none"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="Wi-Fi"><path d="M2.5 8.5a15 15 0 0 1 19 0"/><path d="M5.5 12a10 10 0 0 1 13 0"/><path d="M8.5 15.4a5 5 0 0 1 7 0"/><circle cx="12" cy="18.8" r="1.1" fill="currentColor" stroke="none"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-label="電池"><rect x="2" y="7" width="18" height="10" rx="2.5"/><rect x="4" y="9" width="12" height="6" rx="1" fill="currentColor" stroke="none"/><path d="M22 10.5v3"/></svg>
        </span>
      </div>
      <div class="topbar">
        <div class="back" id="backBtn" role="button" tabindex="0" aria-label="前の画面に戻る" onclick="back()">‹</div>
        <div class="avatar" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V9l8-4 8 4v12"/><path d="M4 21h16"/><path d="M9.5 21v-5h5v5"/><path d="M8.5 11h1M14.5 11h1"/></svg></div>
        <div><div class="t" id="barTitle">守成クラブ 南会場</div><div class="s" id="barSub">公式アカウント</div></div>
      </div>
      <div class="screen" id="screen" tabindex="-1"></div>
    </div>

    <!-- ============ 管理画面 ============ -->
    <div class="admin hide" id="side-adm" role="tabpanel" aria-labelledby="sw-adm">
      <div class="admin-bar">🖥️ 世話人 管理画面</div>
      <div class="admin-body">
        <div class="sec">
          <h3><span class="n">1</span>会員データの取り込み（本部CSV）</h3>
          <div class="drop" id="drop" role="button" tabindex="0" aria-live="polite" onclick="importCsv()">📄 会員名簿CSVをここにアップロード<br><span style="font-size:12px;color:var(--cap)">（クリックで取り込みシミュレーション）</span></div>
          <div class="note">本部から月1回届くCSVをアップすると、会員名簿と出欠の土台が更新されます。</div>
        </div>

        <div class="sec">
          <h3><span class="n">2</span>例会を登録（＝年間スケジュールに自動反映）</h3>
          <div class="rowg">
            <div><label class="mlabel" for="ad-date">開催日<span class="req" aria-hidden="true">*</span></label><input class="mini" id="ad-date" aria-required="true" oninput="clearMtgErr()" placeholder="例）2026-08-15"></div>
            <div><label class="mlabel" for="ad-place">会場</label><input class="mini" id="ad-place" placeholder="例）◯◯ホテル 3F"></div>
          </div>
          <label class="mlabel" for="ad-party">懇親会</label>
          <input class="mini" id="ad-party" placeholder="例）1F レストラン（会費5,000円）">
          <button class="btn sub" onclick="addMeeting()">＋ この例会を追加</button>
          <div class="note" id="ad-msg" role="status" aria-live="polite"></div>
        </div>

        <div class="sec">
          <h3><span class="n">3</span>出欠・懇親会の集計（リアルタイム）</h3>
          <div class="stat" aria-live="polite">
            <div class="b"><div class="v" id="st-att">0</div><div class="l">例会 出席</div></div>
            <div class="b"><div class="v" id="st-abs">0</div><div class="l">例会 欠席</div></div>
            <div class="b"><div class="v" id="st-par">0</div><div class="l">懇親会 参加</div></div>
          </div>
          <div class="tbl-scroll">
            <table class="tbl">
              <thead><tr><th>会員</th><th>会社</th><th>例会</th><th>懇親会</th></tr></thead>
              <tbody id="st-tbl"></tbody>
            </table>
          </div>
          <button class="btn sub" style="margin-top:16px" onclick="exportCsv()">⬇ 出欠をCSVで書き出し</button>
          <div class="saved" id="csv-msg" role="status" aria-live="polite" style="margin-top:12px"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ---------- 単色ラインアイコン（自己完結・currentColorで色反転対応） ----------
const SVGA='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">';
const ICON={
  att : SVGA+'<rect x="5" y="4" width="14" height="17" rx="2.5"/><path d="M9 4.5h6v2.5H9z"/><path d="M8.5 13l2 2 4.2-4.2"/></svg>',
  sch : SVGA+'<rect x="4" y="5" width="16" height="15" rx="2.5"/><path d="M4 9.5h16"/><path d="M8.5 3v4M15.5 3v4"/></svg>',
  map : SVGA+'<path d="M12 21s6.5-5.8 6.5-11a6.5 6.5 0 1 0-13 0C5.5 15.2 12 21 12 21z"/><circle cx="12" cy="10" r="2.4"/></svg>',

  {id:'m2', date:'2026年 9月19日(土) 18:30', place:'ホテルライフォート札幌 2F', party:'BAN×KARA ZONE-HS（会費5,000円）'},
  {id:'m3', date:'2026年10月17日(土) 18:30', place:'ホテルライフォート札幌 2F', party:'BAN×KARA ZONE-HS（会費4,500円）'},
];
// state
let auth = null;                 // ログイン中の会員
const rsvp = {};                 // {meetingId: {mtg:'y'|'n', party:'y'|'n'}}

// ---------- ルーティング ----------
const titles = {
  home:['守成クラブ 南会場','公式アカウント'],
  att:['例会の出欠登録',''], sch:['年間スケジュール',''], map:['会場マップ・アクセス',''],
  mem:['会員名簿',''], news:['お知らせ',''], contact:['事務局へ問い合わせ','']
};
let view='home';           // 現在の画面
const navStack=[];         // 遷移履歴（戻る用）
let booted=false;          // 初期化後のみフォーカス移動する
function applyView(v){
  const bt=document.getElementById('backBtn');
  bt.classList.toggle('show', v!=='home');
  document.getElementById('barTitle').textContent=titles[v][0];
  document.getElementById('barSub').textContent=titles[v][1];
  render(v);
  // 画面総入れ替え後にフォーカスを取り戻す（キーボード/支援技術対策）
  if(booted){
    const sc=document.getElementById('screen');
    if(sc&&sc.focus) sc.focus({preventScroll:true});
  }
}
function go(v){
  if(v!==view) navStack.push(view);   // 直前の画面を積む
  view=v;
  applyView(v);
}
function back(){
  const prev=navStack.pop()||'home';  // 1つ前へ（なければホーム）
  view=prev;
  applyView(prev);
}
// role=button 要素（タイル・戻る）をキーボード操作可能に
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter'&&e.key!==' ')return;
  const el=document.activeElement;
  if(el&&el.getAttribute&&el.getAttribute('role')==='button'){e.preventDefault();el.click();}
});
function render(v){
  const s=document.getElementById('screen');
  if(v==='home') return s.innerHTML=homeHTML();
  if(v==='att')  return s.innerHTML=auth?attListHTML():authHTML();
  if(v==='sch')  return s.innerHTML=schHTML();
  if(v==='map')  return s.innerHTML=mapHTML();
  if(v==='mem')  return s.innerHTML=auth?memHTML():lockHTML();
  if(v==='news') return s.innerHTML=newsHTML();
  if(v==='contact') return s.innerHTML=contactHTML();
}

// ---------- 各画面 ----------
function homeHTML(){
  return `<div class="home">
    <div class="chatbg"><div class="bubble">南会場の公式LINEへようこそ！<br>下のメニュー <b>「例会の出欠登録」</b> から、毎月の出欠をワンタップで登録できます。</div></div>
    <div class="richwrap">
      <div class="menulabel">▼ メニュー</div>

        <div class="tile" role="button" tabindex="0" aria-label="年間スケジュール" onclick="go('sch')"><div class="ic">${ICON.sch}</div><div class="lb">年間<br>スケジュール</div></div>
        <div class="tile" role="button" tabindex="0" aria-label="会場マップ" onclick="go('map')"><div class="ic">${ICON.map}</div><div class="lb">会場マップ</div></div>
        <div class="tile" role="button" tabindex="0" aria-label="会員名簿" onclick="go('mem')"><div class="ic">${ICON.mem}</div><div class="lb">会員名簿</div></div>
        <div class="tile" role="button" tabindex="0" aria-label="お知らせ" onclick="go('news')"><div class="ic">${ICON.news}</div><div class="lb">お知らせ</div></div>
        <div class="tile" role="button" tabindex="0" aria-label="事務局へ問い合わせ" onclick="go('contact')"><div class="ic">${ICON.chat}</div><div class="lb">事務局へ<br>問い合わせ</div></div>
      </div>
    </div>
  </div>`;
}
function authHTML(){
  return `<div class="pad">
    <div class="scr-title">初回だけ 会員確認</div>
    <div class="scr-sub">LINEと会員情報をひも付けます。次回からは自動でログインされ、この画面はスキップされます。</div>
    <div class="auth-err" id="auth-err" role="alert"></div>
    <div class="field"><label for="in-no">会員番号<span class="req">*</span></label><input id="in-no" inputmode="numeric" placeholder="例）1024" oninput="chkAuth()"></div>
    <div class="field"><label for="in-nm">お名前<span class="req">*</span></label><input id="in-nm" placeholder="例）高瀬" oninput="chkAuth()"></div>
    <button class="btn" id="authBtn" disabled onclick="doAuth()">この内容で確認する</button>
    <div class="hint">※ 本部CSVの会員番号・氏名と照合します（モックは 1024 / 高瀬 で通ります）。LINE IDは自動で取得されるため入力不要です。</div>
  </div>`;
}
function chkAuth(){
  const no=document.getElementById('in-no').value.trim();
  const nm=document.getElementById('in-nm').value.trim();
  const b=document.getElementById('authBtn');
  if(b) b.disabled=!(no&&nm);
  // 入力し直したらエラー表示を解除
  const err=document.getElementById('auth-err');
  if(err){err.classList.remove('show');}
  document.getElementById('in-no').classList.remove('input-err');
  document.getElementById('in-nm').classList.remove('input-err');
}
function doAuth(){
  const no=document.getElementById('in-no').value.trim();
  const nm=document.getElementById('in-nm').value.trim();
  // 会員番号と氏名の両方が一致した場合のみ通す（不一致は先へ進めない）
  const m=members.find(x=>x.no===no && x.name===nm);
  if(!m){
    const err=document.getElementById('auth-err');
    err.textContent='会員番号またはお名前が一致しません。本部からの会員情報をご確認ください。';
    err.classList.add('show');
    document.getElementById('in-no').classList.add('input-err');
    document.getElementById('in-nm').classList.add('input-err');
    return;
  }
  auth=m;
  go('att');
}
function attListHTML(){
  if(!meetings.length){
    return `<div class="pad">
      <div class="scr-title">こんにちは、${auth.name} さん</div>
      <div class="scr-sub">参加する例会をワンタップで登録してください。あとから何度でも変更できます。</div>
      <div class="empty"><span class="em-ic">🗓️</span>現在、登録された例会はありません。<br>世話人が例会を登録するとここに表示されます。</div>
    </div>`;
  }
  let cards = meetings.map(m=>{
    const r = rsvp[m.id]||{};
    // 出席=緑, 欠席=赤系
    const mtgY = r.mtg==='y'?'pick-y':'';
    const mtgN = r.mtg==='n'?'pick-n':'';
    const parY = r.party==='y'?'pick-y':'';
    const parN = r.party==='n'?'pick-n':'';
    return `<div class="card">
      <div class="date">${ICON.calSm} ${m.date}</div>
      <div class="meta">会場：${m.place}<br>懇親会：${m.party}</div>
      <div class="seg-row"><span class="k">例会</span>
        <div class="seg">
          <button class="${mtgY}" onclick="setR('${m.id}','mtg','y')">出席</button>
          <button class="${mtgN}" onclick="setR('${m.id}','mtg','n')">欠席</button>
        </div>
      </div>
      <div class="seg-row"><span class="k">懇親会</span>
        <div class="seg">
          <button class="${parY}" onclick="setR('${m.id}','party','y')">参加</button>
          <button class="${parN}" onclick="setR('${m.id}','party','n')">不参加</button>
        </div>
      </div>
      <div class="saved ${(r.mtg||r.party)?'show':''}" role="status" aria-live="polite">✓ 登録しました（いつでも変更できます）</div>
    </div>`;
  }).join('');
  return `<div class="pad">
    <div class="scr-title">こんにちは、${auth.name} さん</div>
    <div class="scr-sub">参加する例会をワンタップで登録してください。あとから何度でも変更できます。</div>
    ${cards}</div>`;
}
function setR(id,key,val){
  rsvp[id]=rsvp[id]||{};
  rsvp[id][key]=val;
  render('att');       // 再描画
  refreshAdmin();
}
function schHTML(){
  if(!meetings.length){
    return `<div class="pad"><div class="scr-title">年間スケジュール</div>
      <div class="scr-sub">世話人が管理画面に登録した例会が、ここに自動で表示されます。</div>
      <div class="empty"><span class="em-ic">🗓️</span>登録された例会はまだありません。</div></div>`;

  let rows=meetings.map(m=>`<div class="card"><div class="date">${ICON.calSm} ${m.date}</div><div class="meta">会場：${m.place}<br>懇親会：${m.party}</div></div>`).join('');
  return `<div class="pad"><div class="scr-title">年間スケジュール</div>
    <div class="scr-sub">世話人が管理画面に登録した例会が、ここに自動で表示されます。</div>${rows}</div>`;
}

    <div class="saved" id="contact-msg" role="status" aria-live="polite" style="margin-top:12px"></div></div>`;

function sendContact(){
  const msg=document.getElementById('contact-msg');
  if(!msg)return;
  msg.textContent='✓ 送信しました。事務局より折り返しご連絡します（モック）';
  msg.classList.add('show');
}
function exportCsv(){
  const msg=document.getElementById('csv-msg');
  if(!msg)return;
  msg.textContent='✓ 出欠をCSVで書き出しました（モック）';
  msg.classList.add('show');
}

// ---------- 管理画面連動 ----------
function refreshAdmin(){
  let att=0,abs=0,par=0;
  Object.values(rsvp).forEach(r=>{ if(r.mtg==='y')att++; if(r.mtg==='n')abs++; if(r.party==='y')par++; });
  document.getElementById('st-att').textContent=att;
  document.getElementById('st-abs').textContent=abs;
  document.getElementById('st-par').textContent=par;
  // 表：ログイン会員の登録状況を1行で（デモ）
  const tb=document.getElementById('st-tbl');
  let rows='';
  const me=auth||members[0];
  meetings.forEach(m=>{
    const r=rsvp[m.id]; if(!r) return;
    const mt = r.mtg==='y'?'<span class="bg y">出席</span>':(r.mtg==='n'?'<span class="bg no">欠席</span>':'—');
    const pt = r.party==='y'?'<span class="bg y">参加</span>':(r.party==='n'?'<span class="bg no">不参加</span>':'—');
    const shortDate=(m.date.match(/\d+月\d+日/)||[m.date])[0];  // 「8月15日」等を正しく抽出（途中欠け防止）
    rows+=`<tr><td>${me.name}</td><td>${me.co}</td><td>${mt}<span class="sub-date">${shortDate}</span></td><td>${pt}</td></tr>`;
  });
  tb.innerHTML=rows||`<tr><td colspan="4" style="color:var(--sub);text-align:center;padding:24px 16px">会員側で出欠を登録すると、ここに反映されます</td></tr>`;
}
function importCsv(){
  csvDone=true;
  const d=document.getElementById('drop');
  d.classList.add('done');
  d.innerHTML=`✓ 取り込み完了：会員 ${members.length} 名を登録しました`;
}
function clearMtgErr(){
  document.getElementById('ad-date').classList.remove('input-err');
  const msg=document.getElementById('ad-msg');
  if(msg&&msg.classList.contains('err')){msg.textContent='';msg.className='note';msg.setAttribute('aria-live','polite');}
}
function addMeeting(){
  const dt=document.getElementById('ad-date').value.trim();
  const pl=document.getElementById('ad-place').value.trim();
  const pa=document.getElementById('ad-party').value.trim();
  const msg=document.getElementById('ad-msg');
  if(!dt){
    // エラーとして明確に伝える（赤系・assertive・入力枠強調・フォーカス誘導）
    msg.textContent='開催日を入力してください。';
    msg.className='note err';
    msg.setAttribute('aria-live','assertive');
    const dd=document.getElementById('ad-date');
    dd.classList.add('input-err');
    dd.focus();
    return;
  }
  meetings.push({id:'m'+(meetings.length+1),date:dt,place:pl||'（未定）',party:pa||'（未定）'});
  msg.textContent='✓ 追加しました。会員側の「年間スケジュール」「出欠登録」に反映されます。';
  msg.className='note ok';
  msg.setAttribute('aria-live','polite');
  document.getElementById('ad-date').classList.remove('input-err');
  document.getElementById('ad-date').value='';document.getElementById('ad-place').value='';document.getElementById('ad-party').value='';
  // 会員側を表示中なら即時反映（表示鮮度の担保）
  if(!document.getElementById('side-mem').classList.contains('hide')) render(view);
}
function showSide(s){
  document.getElementById('side-mem').classList.toggle('hide', s!=='mem');
  document.getElementById('side-adm').classList.toggle('hide', s!=='adm');
  document.getElementById('sw-mem').classList.toggle('on', s==='mem');
  document.getElementById('sw-adm').classList.toggle('on', s==='adm');
  document.getElementById('sw-mem').setAttribute('aria-selected', s==='mem');
  document.getElementById('sw-adm').setAttribute('aria-selected', s==='adm');
  if(s==='mem') render(view);   // 管理画面で追加した例会などを会員側へ反映
  if(s==='adm') refreshAdmin();
}

// init
go('home');
refreshAdmin();
booted=true;   // 以降の画面遷移でフォーカスを#screenへ移す
</script>
